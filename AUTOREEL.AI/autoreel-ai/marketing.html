<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoReel.AI — Generate Viral Videos on Autopilot</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060f;
  --bg2:#0a0a16;
  --surface:#0e0e1c;
  --surface2:#13132200;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --accent:#6366f1;
  --accent2:#818cf8;
  --accent-soft:rgba(99,102,241,0.15);
  --accent-glow:rgba(99,102,241,0.3);
  --orange:#f97316;
  --green:#22d3a5;
  --red:#f43f5e;
  --text:#f0f0fa;
  --text2:#9090b0;
  --text3:#50507a;
  --heading-font:'Bricolage Grotesque',sans-serif;
  --body-font:'Plus Jakarta Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--body-font);background:var(--bg);color:var(--text);overflow-x:hidden;cursor:none}

/* Custom cursor */
.cursor{position:fixed;width:10px;height:10px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s;mix-blend-mode:screen}
.cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid rgba(99,102,241,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .18s ease;mix-blend-mode:screen}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent-soft);border-radius:4px}

/* ── NOISE OVERLAY ── */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* ══════════ NAVBAR ══════════ */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 40px;height:68px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(24px);border-bottom:1px solid var(--border);background:rgba(6,6,15,0.7);transition:all .3s}
nav.scrolled{height:58px;background:rgba(6,6,15,0.95)}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:var(--heading-font);font-size:20px;font-weight:800;text-decoration:none;color:var(--text)}
.nav-logo-mark{width:34px;height:34px;background:linear-gradient(135deg,#6366f1,#f97316);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 4px 16px rgba(99,102,241,0.4)}
.nav-logo span{color:#818cf8}
.nav-links{display:flex;align-items:center;gap:12px}
.nav-links a{padding:7px 14px;color:var(--text2);font-size:14px;font-weight:500;text-decoration:none;border-radius:8px;transition:all .18s}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.nav-right{display:flex;align-items:center;gap:16px}
.live-dot{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);font-weight:600;padding:5px 12px;background:rgba(34,211,165,0.08);border:1px solid rgba(34,211,165,0.2);border-radius:20px}
.live-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(0.85)}}
.nav-dashboard{color:var(--text2);font-size:14px;font-weight:500;text-decoration:none;padding:7px 14px;transition:color .18s}
.nav-dashboard:hover{color:var(--text)}
.nav-cta{padding:8px 20px;background:var(--text);color:var(--bg);border-radius:20px;font-size:13px;font-weight:700;text-decoration:none;transition:all .2s;border:none;cursor:pointer;font-family:var(--body-font)}
.nav-cta:hover{background:var(--accent2);color:#fff;box-shadow:0 4px 20px rgba(99,102,241,0.4)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:var(--surface);border:1px solid var(--border2);border-radius:8px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text2);border-radius:2px;transition:all .25s}

/* Mobile nav overlay */
.mobile-overlay{position:fixed;inset:0;background:rgba(6,6,15,0.98);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;opacity:0;pointer-events:none;transition:opacity .3s}
.mobile-overlay.open{opacity:1;pointer-events:all}
.mobile-overlay a{font-family:var(--heading-font);font-size:28px;font-weight:700;color:var(--text2);text-decoration:none;transition:color .18s}
.mobile-overlay a:hover{color:var(--text)}
.mobile-close{position:absolute;top:24px;right:24px;font-size:28px;cursor:pointer;color:var(--text2)}

/* ══════════ HERO ══════════ */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 40px 80px;text-align:center;position:relative;overflow:hidden}
.hero-orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;animation:orbFloat 12s ease-in-out infinite}
.hero-orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.18),transparent 70%);top:-100px;left:-100px;animation-delay:0s}
.hero-orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(249,115,22,0.12),transparent 70%);bottom:-50px;right:-80px;animation-delay:-5s}
.hero-orb3{width:400px;height:400px;background:radial-gradient(circle,rgba(34,211,165,0.08),transparent 70%);top:40%;left:50%;transform:translate(-50%,-50%);animation-delay:-9s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(0.97)}}
.hero-orb1{animation-name:orbFloat1}
@keyframes orbFloat1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}

.hero-badge{display:inline-flex;align-items:center;gap:12px;padding:8px 18px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:30px;font-size:13px;color:var(--text2);margin-bottom:28px;position:relative;z-index:1}
.hero-badge-stars{color:#fbbf24;letter-spacing:2px;font-size:11px}
.hero-badge-sep{width:1px;height:14px;background:var(--border2)}

.hero-title{font-family:var(--heading-font);font-size:clamp(40px,6vw,76px);font-weight:800;line-height:1.08;letter-spacing:-2px;position:relative;z-index:1;margin-bottom:20px;max-width:900px}
.hero-title .line{display:block;overflow:hidden}
.hero-title .line span{display:block;animation:lineUp .8s cubic-bezier(.16,1,.3,1) backwards}
.hero-title .line:nth-child(1) span{animation-delay:.1s}
.hero-title .line:nth-child(2) span{animation-delay:.22s}
.hero-title .line:nth-child(3) span{animation-delay:.34s}
@keyframes lineUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.gradient-text{background:linear-gradient(135deg,#6366f1 0%,#a78bfa 40%,#f97316 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Typewriter */
.typewriter-wrap{display:inline-block;min-width:380px;text-align:left}
.typewriter{border-right:3px solid var(--accent);padding-right:4px;animation:blink-caret .75s step-end infinite;white-space:nowrap}
@keyframes blink-caret{from,to{border-color:transparent}50%{border-color:var(--accent)}}

.hero-sub{font-size:clamp(15px,2vw,18px);color:var(--text2);max-width:560px;line-height:1.7;margin-bottom:36px;position:relative;z-index:1;animation:fadeUp .8s .5s backwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.hero-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;position:relative;z-index:1;animation:fadeUp .8s .65s backwards}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:linear-gradient(135deg,#6366f1,#818cf8);border:none;border-radius:12px;color:#fff;font-family:var(--body-font);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 8px 32px rgba(99,102,241,0.4);transition:all .22s;position:relative;overflow:hidden;text-decoration:none}
.btn-primary::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left .5s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(99,102,241,0.55)}
.btn-primary:hover::after{left:150%}
.btn-outline{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-family:var(--body-font);font-size:15px;font-weight:600;cursor:pointer;transition:all .22s;text-decoration:none}
.btn-outline:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);transform:translateY(-2px)}

/* Marquee ticker */
.ticker-wrap{width:100%;overflow:hidden;position:relative;z-index:1;margin-bottom:48px;animation:fadeUp .8s .8s backwards}
.ticker-wrap::before,.ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2;pointer-events:none}
.ticker-wrap::before{left:0;background:linear-gradient(90deg,var(--bg),transparent)}
.ticker-wrap::after{right:0;background:linear-gradient(-90deg,var(--bg),transparent)}
.ticker{display:flex;gap:0;animation:ticker 25s linear infinite;width:max-content}
.ticker:hover{animation-play-state:paused}
.ticker-item{display:inline-flex;align-items:center;gap:8px;padding:7px 20px;font-size:12px;color:var(--text3);white-space:nowrap}
.ticker-item strong{color:var(--text2)}
.ticker-sep{color:var(--text3);margin:0 4px}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Platform logos */
.platforms{display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;z-index:1;animation:fadeUp .8s .9s backwards}
.platform-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.platform-logos{display:flex;align-items:center;gap:28px}
.platform-logo-item{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700;color:var(--text2);transition:color .18s}
.platform-logo-item:hover{color:var(--text)}
.platform-logo-item .yt{color:#ff0000}
.platform-logo-item .ig{color:#e4405f}
.platform-logo-item .tt{color:#fff}

/* Avatar stack */
.avatar-stack{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text2);margin-top:14px}
.avatars{display:flex}
.avatar-circle{width:30px;height:30px;border-radius:50%;border:2px solid var(--bg);margin-left:-8px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
.avatar-circle:first-child{margin-left:0}
.avatar-stack strong{color:var(--accent2)}

/* Scroll arrow */
.scroll-arrow{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text3);font-size:11px;letter-spacing:.1em;text-transform:uppercase;animation:bounce 2s ease-in-out infinite;z-index:10;-webkit-user-select:none;user-select:none}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
.scroll-arrow svg{opacity:.4}

/* ══════════ STATS BAND ══════════ */
.stats-band{padding:60px 40px;background:linear-gradient(180deg,rgba(99,102,241,0.04) 0%,transparent 100%);border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;z-index:1}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;max-width:1000px;margin:0 auto}
.stat-item{text-align:center;padding:20px}
.stat-icon{font-size:26px;margin-bottom:8px}
.stat-number{font-family:var(--heading-font);font-size:clamp(32px,4vw,48px);font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#fff,var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:13px;color:var(--text3);margin-top:4px;font-weight:500}

/* ══════════ SHARED SECTION STYLES ══════════ */
section{position:relative;z-index:1}
.section-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent2);margin-bottom:14px;display:block}
.section-heading{font-family:var(--heading-font);font-size:clamp(28px,4vw,48px);font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:14px}
.section-sub{font-size:16px;color:var(--text2);line-height:1.7;max-width:560px}
.container{max-width:1180px;margin:0 auto;padding:0 40px}
.section-pad{padding:100px 0}

/* Reveal animation */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.2s}
.reveal-delay-3{transition-delay:.3s}
.reveal-delay-4{transition-delay:.4s}

/* ══════════ APP PREVIEW ══════════ */
.app-preview-section{padding:100px 0 0;overflow:hidden}
.app-preview-header{text-align:center;margin-bottom:50px}
.app-frame{max-width:1060px;margin:0 auto;border-radius:20px;overflow:hidden;border:1px solid rgba(99,102,241,0.3);box-shadow:0 0 0 1px rgba(99,102,241,0.1),0 40px 120px rgba(99,102,241,0.2),0 0 60px rgba(99,102,241,0.1);position:relative}
.app-frame-bar{height:42px;background:#0e0e1c;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:7px}
.app-frame-dot{width:12px;height:12px;border-radius:50%}
.app-frame-url{flex:1;margin:0 16px;height:24px;background:var(--surface);border-radius:6px;display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--text3);gap:6px}
.app-inner{display:grid;grid-template-columns:220px 280px 1fr;height:520px;background:var(--bg2)}

/* Sidebar */
.app-sidebar{border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
.app-sidebar-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:12px;color:var(--text3);cursor:pointer;transition:all .15s}
.app-sidebar-item.active{background:rgba(255,255,255,0.07);color:var(--text)}
.app-sidebar-item:hover:not(.active){background:rgba(255,255,255,0.04);color:var(--text2)}
.app-sidebar-section{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:12px 10px 4px}
.credits-row{margin-top:auto;padding:10px;background:var(--surface);border-radius:8px;font-size:11px}
.credits-label{color:var(--text3);margin-bottom:4px}
.credits-bar{height:4px;background:var(--surface);border-radius:4px;overflow:hidden;margin-bottom:6px}
.credits-fill{width:60%;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px}
.credits-val{font-size:12px;font-weight:700;color:var(--text)}

/* App center panel */
.app-panel{border-right:1px solid var(--border);padding:16px;overflow-y:auto;font-size:12px}
.app-panel-section{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.app-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.app-toggle-label{font-size:12px;font-weight:600;color:var(--text2)}
.app-toggle{width:40px;height:22px;background:var(--accent);border-radius:11px;position:relative;cursor:pointer}
.app-toggle::after{content:'';position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.caption-type{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px}
.caption-type-btn{padding:7px;text-align:center;font-size:11px;cursor:pointer;transition:background .15s;color:var(--text2)}
.caption-type-btn.active{background:rgba(255,255,255,0.08);color:var(--text)}
.app-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.font-select{width:100%;padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:12px;margin-bottom:12px}
.color-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.color-preview{width:24px;height:24px;border-radius:5px;background:#fff;border:1px solid var(--border2)}
.slider-row{margin-bottom:12px}
.slider-top{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.slider{width:100%;height:4px;background:var(--surface2);border-radius:4px;position:relative}
.slider-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;position:relative}
.slider-fill::after{content:'';position:absolute;right:-6px;top:-5px;width:14px;height:14px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent)}
.highlight-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.hl-btn{padding:6px;text-align:center;font-size:11px;color:var(--text3);cursor:pointer;transition:background .15s}
.hl-btn.active{background:rgba(255,255,255,0.08);color:var(--text)}

/* Video preview */
.app-video{position:relative;display:flex;flex-direction:column}
.app-video-frame{flex:1;background:linear-gradient(180deg,#1a2a3a,#0a1520);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.app-video-frame img{width:100%;height:100%;object-fit:cover;opacity:.85}
.video-bg{width:100%;height:100%;background:linear-gradient(135deg,#1e3a5f 0%,#2d5a8a 30%,#1a4a6e 60%,#0d2a40 100%);position:absolute;inset:0}
.bridge-graphic{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.bridge-graphic svg{width:100%;height:100%;opacity:.7}
.play-btn{position:absolute;width:56px;height:56px;background:rgba(255,255,255,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.play-btn svg{margin-left:4px}
.mute-btn{position:absolute;top:12px;right:12px;width:32px;height:32px;background:rgba(255,255,255,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.video-caption{position:absolute;bottom:30%;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.caption-highlight{color:#fbbf24}
/* Timeline */
.app-timeline{height:100px;background:#0a0a14;border-top:1px solid var(--border);padding:10px 12px}
.timeline-bar{display:flex;align-items:center;gap:10px;font-size:10px;color:var(--text3);margin-bottom:6px}
.timeline-track{flex:1;height:3px;background:var(--surface);border-radius:3px;position:relative}
.timeline-progress{width:8%;height:100%;background:var(--accent);border-radius:3px}
.timeline-thumbs{display:flex;gap:3px;height:50px}
.timeline-thumb{flex:1;border-radius:4px;background:linear-gradient(135deg,#1e3a5f,#2d5a8a);overflow:hidden;position:relative;font-size:8px;color:rgba(255,255,255,0.4);display:flex;align-items:flex-end;padding:3px}

/* Feature tabs below frame */
.feature-tabs{display:flex;gap:0;justify-content:center;margin-top:0}
.feature-tab{flex:1;max-width:320px;padding:18px 24px;background:var(--surface);border:1px solid var(--border);border-top:none;cursor:pointer;transition:all .2s;text-align:center}
.feature-tab:first-child{border-radius:0 0 0 16px}
.feature-tab:last-child{border-radius:0 0 16px 0}
.feature-tab.active{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.3)}
.feature-tab-icon{font-size:20px;margin-bottom:6px}
.feature-tab-title{font-size:13px;font-weight:700;margin-bottom:3px}
.feature-tab-sub{font-size:11px;color:var(--text3)}

/* ══════════ HOW IT WORKS ══════════ */
.how-section{padding:100px 0}
.how-header{text-align:center;margin-bottom:60px}
.steps-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;position:relative}
.steps-row::before{content:'';position:absolute;top:48px;left:calc(16.66% + 20px);right:calc(16.66% + 20px);height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:0}

.step-icon{font-size:28px;margin-bottom:14px}
.step-title{font-family:var(--heading-font);font-size:20px;font-weight:700;margin-bottom:10px}
.step-desc{font-size:13px;color:var(--text2);line-height:1.7}

/* ══════════ FEATURES BENTO ══════════ */
.features-section{padding:100px 0}
.features-header{text-align:center;margin-bottom:50px}
.bento-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:14px}
.bento-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;transition:all .28s;position:relative;overflow:hidden}
.bento-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--card-color,rgba(99,102,241,0.05)),transparent);pointer-events:none;opacity:0;transition:opacity .3s}
.bento-card:hover{transform:translateY(-4px);border-color:var(--card-color,rgba(99,102,241,0.3));box-shadow:0 20px 50px rgba(0,0,0,0.3)}

.bento-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px;background:var(--card-icon-bg,rgba(99,102,241,0.12))}
.bento-title{font-family:var(--heading-font);font-size:20px;font-weight:700;margin-bottom:8px}
.bento-desc{font-size:13px;color:var(--text2);line-height:1.7}
.bento-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;margin-top:14px;border:1px solid}

/* ══════════ VIDEO SHOWCASE ══════════ */
.showcase-section{padding:100px 0;overflow:hidden}
.showcase-header{text-align:center;margin-bottom:50px}
.phone-carousel{display:flex;gap:16px;animation:scrollCarousel 30s linear infinite;width:max-content}
.phone-carousel:hover{animation-play-state:paused}
@keyframes scrollCarousel{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.phone-card{width:170px;flex-shrink:0;border-radius:28px;overflow:hidden;border:3px solid rgba(255,255,255,0.1);box-shadow:0 20px 60px rgba(0,0,0,0.5);position:relative;transition:transform .3s}
.phone-card:hover{transform:scale(1.05) translateY(-8px)}
.phone-card.tall{height:340px}
.phone-card.short{height:280px;margin-top:30px}
.phone-screen{width:100%;height:100%;position:relative;overflow:hidden}
.phone-gradient{width:100%;height:100%;background:var(--g)}
.phone-caption-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px 14px 14px;background:linear-gradient(transparent,rgba(0,0,0,0.8))}
.phone-title{font-family:var(--heading-font);font-size:13px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.phone-views{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:rgba(0,0,0,0.7);font-size:11px;font-weight:700;color:#fff}
.showcase-cta{margin:40px auto 0;max-width:700px;background:var(--surface);border:1px solid rgba(99,102,241,0.3);border-radius:16px;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.showcase-cta-text{font-size:15px;font-weight:600}
.showcase-cta-text span{color:var(--accent2)}

/* ══════════ LETTER SECTION ══════════ */
.letter-section{padding:100px 0}
.letter-card{max-width:860px;margin:0 auto;background:var(--surface);border:1px solid var(--border2);border-radius:24px;overflow:hidden}
.letter-dots{display:flex;gap:8px;justify-content:center;padding:20px 0 0}
.letter-dot{width:32px;height:6px;border-radius:3px;background:var(--border2)}
.letter-dot.active{background:var(--accent);width:48px}
.letter-body{padding:40px 48px}
.letter-heading{font-family:var(--heading-font);font-size:28px;font-weight:800;margin-bottom:20px}
.letter-body p{font-size:15px;color:var(--text2);line-height:1.85;margin-bottom:16px}
.letter-callout{background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:12px;padding:20px 24px;margin:20px 0;font-size:15px;font-weight:600;line-height:1.6;color:var(--text)}
.letter-author{display:flex;align-items:center;gap:14px;padding-top:20px;border-top:1px solid var(--border)}
.letter-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--orange));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0}
.letter-author-name{font-size:14px;font-weight:700}
.letter-author-role{font-size:12px;color:var(--text3)}
/* ══════════ PROBLEM VS SOLUTION ══════════ */
.pvs-section{padding:100px 0}
.pvs-header{text-align:center;margin-bottom:50px}
.pvs-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.pvs-card{background:var(--surface);border-radius:20px;padding:32px;overflow:hidden}
.pvs-card.problem{border:1px solid rgba(244,63,94,0.2);background:rgba(244,63,94,0.03)}
.pvs-card.solution{border:1px solid rgba(34,211,165,0.2);background:rgba(34,211,165,0.03)}
.pvs-card-head{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.pvs-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.pvs-icon.red{background:rgba(244,63,94,0.15)}
.pvs-icon.green{background:rgba(34,211,165,0.12)}
.pvs-title{font-family:var(--heading-font);font-size:18px;font-weight:700}
.pvs-title.red{color:var(--red)}
.pvs-title.green{color:var(--green)}
.pvs-items{display:flex;flex-direction:column;gap:14px}
.pvs-item{display:flex;align-items:flex-start;gap:12px;font-size:14px;color:var(--text2);line-height:1.5}
.pvs-bullet{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px}
.pvs-bullet.red{background:rgba(244,63,94,0.15);color:var(--red)}
.pvs-bullet.green{background:rgba(34,211,165,0.12);color:var(--green)}
.pvs-quote{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(249,115,22,0.05));border:1px solid rgba(99,102,241,0.2);border-radius:16px;padding:24px 32px;text-align:center;font-size:16px;font-weight:600;line-height:1.6;color:var(--text)}
.pvs-quote::before{content:'"';font-size:48px;color:var(--accent);opacity:.4;font-family:Georgia,serif;line-height:0;vertical-align:-14px;margin-right:4px}

/* ══════════ TESTIMONIALS ══════════ */
.testimonials-section{padding:100px 0;overflow:hidden}
.testimonials-header{text-align:center;margin-bottom:50px}
.testimonials-track{display:flex;gap:16px;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.testimonials-viewport{overflow:hidden}
.testimonial-card{min-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;flex-shrink:0;transition:all .2s}

.test-stars{color:#fbbf24;font-size:13px;letter-spacing:2px;margin-bottom:12px}
.test-quote{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:18px;font-style:italic}
.test-author{display:flex;align-items:center;gap:10px}
.test-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.test-name{font-size:13px;font-weight:700}
.test-handle{font-size:11px;color:var(--text3)}
.test-platform{margin-left:auto;font-size:11px;padding:2px 8px;background:var(--surface);border:1px solid var(--border2);border-radius:20px;color:var(--text3)}
.testimonials-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:30px}
.test-nav-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .18s;font-size:14px}
.test-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.test-dots{display:flex;gap:6px}
.test-dot{width:6px;height:6px;border-radius:3px;background:var(--border2);transition:all .2s;cursor:pointer}
.test-dot.active{background:var(--accent);width:20px}
.rating-summary{text-align:center;margin-top:24px;font-size:14px;color:var(--text3)}

.results-section{padding:100px 0}

<script>
// 1. Custom Cursor
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursorRing');

document.addEventListener('mousemove', (e) => {
  const { clientX, clientY } = e;
  cursor.style.left = clientX + 'px';
  cursor.style.top = clientY + 'px';
  
  cursorRing.style.left = clientX + 'px';
  cursorRing.style.top = clientY + 'px';
});

document.addEventListener('mousedown', () => {
  cursorRing.style.width = '24px';
  cursorRing.style.height = '24px';
  cursorRing.style.borderWidth = '4px';
});

document.addEventListener('mouseup', () => {
  cursorRing.style.width = '36px';
  cursorRing.style.height = '36px';
  cursorRing.style.borderWidth = '1.5px';
});

// 2. Navbar Scroll Effect
window.addEventListener('scroll', () => {
  const nav = document.getElementById('navbar');
  if (window.scrollY > 50) {
    nav.classList.add('scrolled');
  } else {
    nav.classList.remove('scrolled');
  }
});

// 3. Mobile Nav Toggle
function toggleMobileNav() {
  const overlay = document.getElementById('mobileOverlay');
  overlay.classList.toggle('open');
}

// 4. Typewriter Effect
const words = ["AI-generated Videos", "TikTok Reels", "YouTube Shorts", "Instagram Reels"];
let wordIdx = 0;
let charIdx = 0;
let isDeleting = false;
const typewriterEl = document.getElementById('typewriter');

function type() {
  const currentWord = words[wordIdx];
  const typeSpeed = isDeleting ? 50 : 100;

  if (isDeleting) {
    typewriterEl.textContent = currentWord.substring(0, charIdx - 1);
    charIdx--;
  } else {
    typewriterEl.textContent = currentWord.substring(0, charIdx + 1);
    charIdx++;
  }

  if (!isDeleting && charIdx === currentWord.length) {
    isDeleting = true;
    setTimeout(type, 2000);
  } else if (isDeleting && charIdx === 0) {
    isDeleting = false;
    wordIdx = (wordIdx + 1) % words.length;
    setTimeout(type, 500);
  } else {
    setTimeout(type, typeSpeed);
  }
}
type();

// 5. Stats Counter
const stats = document.querySelectorAll('.stat-number');
const obsOptions = { threshold: 0.5 };

const statsObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const target = entry.target;
      if (target.id === 'count1') animateCount(target, 50000, 'K+');
      else if (target.id === 'count2') animateCount(target, 14, 'M+');
      statsObserver.unobserve(target);
    }
  });
}, obsOptions);

stats.forEach(s => statsObserver.observe(s));

function animateCount(el, target, suffix) {
  let current = 0;
  const steps = 60;
  const increment = target / steps;
  let timer = setInterval(() => {
    current += increment;
    if (current >= target) {
      el.textContent = Math.floor(target).toLocaleString() + suffix;
      clearInterval(timer);
    } else {
      el.textContent = Math.floor(current).toLocaleString() + suffix;
    }
  }, 30);
}

// 6. Reveal Animations
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

// 7. App Preview Tab Switching
const featureTabs = document.querySelectorAll('.feature-tab');
featureTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    featureTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});

// 8. Testimonials Carousel
const track = document.getElementById('testTrack');
const dots = document.querySelectorAll('.test-dot');
const nextBtn = document.getElementById('testNext');
const prevBtn = document.getElementById('testPrev');
let currentSlide = 0;

function updateTestimonials() {
  const cardWidth = 356; // card width + margin
  track.style.transform = `translateX(-${currentSlide * cardWidth}px)`;
  dots.forEach((d, i) => {
    d.classList.toggle('active', i === currentSlide);
  });
}

nextBtn?.addEventListener('click', () => {
  currentSlide = (currentSlide + 1) % dots.length;
  updateTestimonials();
});

prevBtn?.addEventListener('click', () => {
  currentSlide = (currentSlide - 1 + dots.length) % dots.length;
  updateTestimonials();
});

dots.forEach(dot => {
  dot.addEventListener('click', () => {
    currentSlide = parseInt(dot.getAttribute('data-idx'));
    updateTestimonials();
  });
});

// 9. Pricing Toggle
const billToggle = document.getElementById('billToggle');
const prices = document.querySelectorAll('.price-new');
const monthlyLabel = document.getElementById('billMonthly');
const yearlyLabel = document.getElementById('billYearly');

billToggle.addEventListener('click', () => {
  const isMonthly = billToggle.classList.contains('monthly');
  billToggle.classList.toggle('monthly');
  monthlyLabel.classList.toggle('active');
  yearlyLabel.classList.toggle('active');

  prices.forEach(p => {
    p.textContent = isMonthly ? p.getAttribute('data-yearly') : p.getAttribute('data-monthly');
  });
});

// 10. FAQ Accordion
const faqItems = document.querySelectorAll('.faq-item');
faqItems.forEach(item => {
  item.querySelector('.faq-question').addEventListener('click', () => {
    const wasOpen = item.classList.contains('open');
    faqItems.forEach(i => i.classList.remove('open'));
    if (!wasOpen) item.classList.add('open');
  });
});
</script>
